name: Release (signed, auto-updater)

# v* 태그 푸시 또는 수동 실행으로 macOS · Windows 빌드 → 자동 서명(updater signature)
# → GitHub Release 게시. latest.json 메니페스트는 tauri-action 이 자동 생성·업로드 함.
# 앱은 tauri.conf.json 의 endpoints (Release latest URL) 를 fetch 해서 새 버전 감지.
#
# 릴리스 노트: CHANGELOG.md 의 "## vX.Y.Z" 섹션이 Release 본문이 된다 (notes 잡).
# 섹션이 없으면 빌드 전에 실패한다 → 태그 전에 prepare-release.yml 로 초안 PR 을 만들어
# 머지(=관리자 승인)할 것. 게시 후 본문은 latest.json notes(앱 업데이트 배너)와
# Supabase releases 테이블(웹 #/changelog)로 전파된다. — PM 에이전트 Ethan 파이프라인.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # 릴리스 노트 추출 — CHANGELOG.md 에 해당 버전 섹션이 없으면 여기서 실패(빌드 낭비 방지)
  notes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::릴리스는 vX.Y.Z 태그에서만 실행하세요 (현재 ref: $TAG)."; exit 1
          fi
          BODY=$(awk -v ver="$TAG" '
            $1=="##" && $2==ver { flag=1; next }
            $1=="##" && flag    { exit }
            flag                { print }
          ' CHANGELOG.md | sed -e '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          if [ -z "$BODY" ]; then
            echo "::error::CHANGELOG.md 에 '## $TAG' 섹션이 없습니다. prepare-release.yml 로 초안 PR 을 만들어 머지한 뒤 태그를 다시 푸시하세요."
            exit 1
          fi
          {
            echo "body<<CHANGELOG_BODY_EOF"
            echo "$BODY"
            echo "CHANGELOG_BODY_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "--- Release body ---"; echo "$BODY"

  release:
    needs: notes
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign, and publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 자동 업데이트(minisign) 서명 — Apple 코드서명과 별개
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS 코드서명 + 공증 (Developer ID 발급 완료, 2026-06-23) ──
          # ⚠️ tauri 는 APPLE_CERTIFICATE 가 "존재만 해도"(빈 값이라도) 서명을
          #    시도하다 실패한다 → 아래 6개 GitHub Secrets 가 모두 등록된 뒤에만
          #    태그를 푸시할 것. (미등록 상태로 태그 시 서명 단계에서 빌드 실패)
          #   APPLE_CERTIFICATE            : Developer ID Application .p12 → base64
          #   APPLE_CERTIFICATE_PASSWORD   : 위 .p12 내보낼 때 설정한 비밀번호
          #   APPLE_SIGNING_IDENTITY       : "Developer ID Application: Gu B Deu Co., Ltd. (LHR4658746)"
          #   APPLE_ID / APPLE_PASSWORD    : Apple ID + 앱 암호(app-specific password)
          #   APPLE_TEAM_ID                : LHR4658746
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BaroSit __VERSION__"
          # CHANGELOG.md 의 해당 버전 섹션(관리자 승인분) — notes 잡에서 추출
          releaseBody: ${{ needs.notes.outputs.body }}
          # v0.3.6 에서 서명·공증(.app + .dmg staple) 검증 완료 → 자동 공개로 전환.
          # 태그 푸시 시 빌드 후 Release 가 즉시 Latest 로 공개되고 기존 사용자에게
          # 자동 업데이트가 나간다. 문제 빌드도 바로 배포되므로 빌드 신뢰가 전제.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action 은 .app 만 공증·스테이플하고 .dmg 는 unnotarized 로 남긴다.
      # 사용자가 브라우저로 .dmg 다운로드(quarantine 부착) 후 더블클릭 시
      # "확인되지 않은 개발자" 경고가 다시 뜨는 것을 막기 위해 DMG 도 공증+스테이플.
      - name: Notarize & staple DMG (macOS only)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then echo "No DMG found"; exit 1; fi
          echo "DMG: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"
          spctl -a -vv -t install "$DMG"
          # tauri-action 이 이미 release 에 올린 동일 이름 자산을 staple 된 파일로 교체
          gh release upload "${{ github.ref_name }}" "$DMG" \
            --clobber --repo "${{ github.repository }}"

  # 웹 업데이트 내역(#/changelog = Supabase releases 테이블)에 릴리스 노트 전파.
  # SUPABASE_SERVICE_ROLE_KEY secret 이 없으면 건너뛴다(릴리스 본체는 정상 완료).
  # 단, 스킵/성공 여부를 워크플로 Summary 와 경고 annotation 으로 반드시 노출한다 —
  # 예전엔 ::notice:: 로 조용히 넘어가 v0.9.3 웹 게시 누락이 무증상으로 지나갔다.
  publish-web-changelog:
    needs: [notes, release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Upsert release into Supabase releases table
        shell: bash
        env:
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BODY: ${{ needs.notes.outputs.body }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "::warning title=웹 changelog 미게시::SUPABASE_SERVICE_ROLE_KEY secret 이 없어 $TAG 를 releases 테이블에 게시하지 못했습니다. GitHub Release·앱 업데이터는 정상이나, 웹 #/changelog 페이지에는 반영되지 않습니다."
            echo "### ⚠️ 웹 업데이트 내역 게시 건너뜀 — $TAG" >> "$GITHUB_STEP_SUMMARY"
            echo "\`SUPABASE_SERVICE_ROLE_KEY\` secret 이 없어 releases 테이블 upsert 를 건너뛰었습니다. secret 등록 후 이 워크플로를 재실행하세요." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          SUPABASE_URL="https://kllcnllkcewnutxodwhx.supabase.co"
          jq -n --arg version "$TAG" --arg content "$BODY" \
            --arg released_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version, content: $content, released_at: $released_at, updated_at: $released_at}' \
            > /tmp/release.json
          # return=representation 으로 upsert 결과 행을 돌려받아 실제 기록 여부를 검증한다.
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/releases?on_conflict=version" \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            --data @/tmp/release.json)
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "::error::releases 테이블 upsert 실패 ($HTTP): $(cat /tmp/out.json)"; exit 1
          fi
          ROWS=$(jq 'length' /tmp/out.json 2>/dev/null || echo 0)
          if [ "$ROWS" -lt 1 ]; then
            echo "::error::upsert 응답에 기록된 행이 없습니다 ($HTTP): $(cat /tmp/out.json)"; exit 1
          fi
          echo "웹 업데이트 내역에 $TAG 게시 완료 (행 $ROWS 개)."
          echo "### ✅ 웹 업데이트 내역 게시 완료 — $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "releases 테이블에 반영됨. 확인: https://barosit.com/#/changelog" >> "$GITHUB_STEP_SUMMARY"
