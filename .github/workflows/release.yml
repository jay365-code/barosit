name: Release (signed, auto-updater)

# v* 태그 푸시 또는 수동 실행으로 macOS · Windows 빌드 → 자동 서명(updater signature)
# → GitHub Release 게시. latest.json 메니페스트는 tauri-action 이 자동 생성·업로드 함.
# 앱은 tauri.conf.json 의 endpoints (Release latest URL) 를 fetch 해서 새 버전 감지.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign, and publish to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 자동 업데이트(minisign) 서명 — Apple 코드서명과 별개
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS 코드서명 + 공증 (Developer ID 발급 완료, 2026-06-23) ──
          # ⚠️ tauri 는 APPLE_CERTIFICATE 가 "존재만 해도"(빈 값이라도) 서명을
          #    시도하다 실패한다 → 아래 6개 GitHub Secrets 가 모두 등록된 뒤에만
          #    태그를 푸시할 것. (미등록 상태로 태그 시 서명 단계에서 빌드 실패)
          #   APPLE_CERTIFICATE            : Developer ID Application .p12 → base64
          #   APPLE_CERTIFICATE_PASSWORD   : 위 .p12 내보낼 때 설정한 비밀번호
          #   APPLE_SIGNING_IDENTITY       : "Developer ID Application: Gu B Deu Co., Ltd. (LHR4658746)"
          #   APPLE_ID / APPLE_PASSWORD    : Apple ID + 앱 암호(app-specific password)
          #   APPLE_TEAM_ID                : LHR4658746
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BaroSit __VERSION__"
          releaseBody: |
            ## 변경사항
            아래 자산을 다운로드해 설치하세요. 기존 사용자는 앱이 자동으로 업데이트를 안내합니다.
          # 서명·공증이 검증되면 false 로 바꿔 태그 푸시 시 자동 공개.
          # (그 전까지는 unsigned 빌드가 공개되지 않도록 draft 유지)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
