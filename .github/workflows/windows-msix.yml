name: Windows MSIX

# 무인 MSIX 패키징 — 외부 Windows 머신/GUI 캡처 불필요.
# 태그 푸시(v*) 또는 수동 실행 시 .msix 를 빌드해 아티팩트로 올린다.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Add Windows SDK (makeappx) to PATH
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Directory |
            Where-Object { Test-Path "$($_.FullName)/x64/makeappx.exe" } |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "makeappx.exe 를 가진 Windows SDK 를 찾지 못함" }
          "$($sdk.FullName)/x64" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "SDK: $($sdk.FullName)/x64"

      - name: Install deps
        run: npm ci

      # release.yml 과 같은 이유 — build-msix.ps1 이 `npm run tauri build` 로 프론트를
      # 다시 빌드하므로, 여기서도 VITE_* 를 넘기지 않으면 결제가 죽은 MSIX 가 나온다.
      - name: Verify frontend build secrets
        shell: bash
        env:
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_TOSS_CLIENT_KEY:-}" ]; then
            echo "::error::VITE_TOSS_CLIENT_KEY secret 이 없습니다. 이대로 빌드하면 결제가 동작하지 않는 MSIX 가 만들어집니다."
            exit 1
          fi

      - name: Build MSIX
        shell: pwsh
        env:
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY }}
        run: pwsh scripts/build-msix.ps1

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: barosit-msix
          path: windows/dist/*.msix
          if-no-files-found: error

      # 제출 자동화(선택): Microsoft Store Developer CLI(msstore) 또는 StoreBroker 로
      # Partner Center(제품 9NMG33L2THHH) 업로드·제출. Azure AD 자격증명 시크릿 필요.
      # - name: Publish to Store
      #   run: msstore publish ... (또는 StoreBroker PowerShell)
