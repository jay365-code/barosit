# Supabase Local Configuration for BaroSit

project_id = "barosit"

[api]
port = 54331
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54332
shadow_port = 54333

[studio]
port = 54334

[inbucket]
enabled = true
port = 54335

[analytics]
enabled = true
port = 54337

[edge_runtime]
enabled = true
inspector_port = 8084

# Toss 가 직접 호출하므로 JWT 검증 비활성 (대신 함수 내부에서 S2S 교차검증)
[functions.toss-webhook]
verify_jwt = false

[auth]
site_url = "http://localhost:1430"
# 1430 = 웹 dev 콜백 / 1420 = tauri dev 의 OAuth loopback relay (vite.config.ts devAuthRelay)
additional_redirect_urls = [
  "http://localhost:1430/#/auth/callback",
  "http://localhost:1420/__dev-auth-relay",
]
jwt_expiry = 3600
enable_signup = true

# 🔐 Google 소셜 로그인 설정 (로컬 개발용)
# 실제 키는 gitignore 된 supabase/.env 에서 env() 치환으로 주입.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://127.0.0.1:54331/auth/v1/callback"

# 🔐 Kakao 소셜 로그인 설정 (로컬 개발용)
# 실제 키는 gitignore 된 supabase/.env 에서 env() 치환으로 주입.
[auth.external.kakao]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_KAKAO_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_KAKAO_SECRET)"
redirect_uri = "http://127.0.0.1:54331/auth/v1/callback"
